<!DOCTYPE html>
<html lang="en-AU">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta property="og:title" content="AusDataTech">
    <meta property="og:description" content="Senior Software Engineer, Azure Cloud Architecture and Distributed Systems">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ausdatatech.com.au">
    <meta property="og:image" content="https://ausdatatech.com.au/assets/images/social-preview.png">

    <title>
        {% if page.title %}
        {{ page.title }} | {{ site.title }}
        {% else %}
        {{ site.title }}
        {% endif %}
    </title>

    <meta name="description" content="{{ site.description }}">

    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>

<body>

    <header class="site-header">
        <div class="container header-inner">

            <div class="brand">
                <a class="brand-title" href="{{ '/' | relative_url }}">
                    Aus Data Tech
                </a>
                <div class="brand-subtitle">
                    Cloud-native software engineering on Microsoft Azure
                </div>
            </div>

            <nav class="site-nav" aria-label="Main navigation">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/projects/' | relative_url }}">Projects</a>
                <a href="{{ '/resume/' | relative_url }}">Resume</a>
                <!-- <a href="{{ '/articles/' | relative_url }}">Articles</a> -->
                <a href="{{ '/about/' | relative_url }}">About</a>
            </nav>

        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">

            <p>
                © {{ site.time | date: "%Y" }} Philip Todd
            </p>

            <p>
                <a href="https://github.com/philiptodd" target="_blank" rel="noopener">GitHub</a>
                <span>·</span>
                <a href="https://www.linkedin.com/in/philiptodd" target="_blank" rel="noopener">LinkedIn</a>
                <span>·</span>
                <a href="{{ '/resume/' | relative_url }}">Resume</a>
            </p>

        </div>
    </footer>

</body>

</html>
